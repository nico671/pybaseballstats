name: Run Nightly Integration Tests

on:
  schedule:
    - cron: "0 2 * * 2,5"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(uv run python -c 'import playwright; print(playwright.__version__)')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install playwright browsers
        run: uv run playwright install chromium

      - name: Install playwright browser dependencies
        run: uv run playwright install-deps chromium

      - name: Run integration suites
        run: |
          uv run pytest tests/ -m "integration or heavy or playwright or data_dependent" -q

      - name: Generate full integration coverage report
        run: |
          uv run coverage erase
          uv run coverage run -m pytest tests/ -m "integration or heavy or playwright or data_dependent"
          uv run coverage report -m
          uv run coverage json -o coverage.json

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightly-integration-coverage
          path: coverage.json
