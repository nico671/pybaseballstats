name: Run Unit Tests

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for relevant changes
        id: changes
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            changed_files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            changed_files=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "src/ tests/")
          fi

          if echo "$changed_files" | grep -qE '^(src/|tests/|pyproject\.toml|uv\.lock)'; then
            echo "run_tests=true" >> $GITHUB_OUTPUT
            echo "Tests will run - relevant files changed"
          else
            echo "run_tests=false" >> $GITHUB_OUTPUT
            echo "Tests skipped - no relevant files changed"
          fi

      - name: Install uv
        if: steps.changes.outputs.run_tests == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        if: steps.changes.outputs.run_tests == 'true'
        run: uv python install

      - name: Install dependencies
        if: steps.changes.outputs.run_tests == 'true'
        run: uv sync --locked --all-extras --dev

      - name: Run unit tests (required)
        if: steps.changes.outputs.run_tests == 'true'
        run: uv run pytest tests/ -m unit

      - name: Run smoke tests - pass 1 (non-blocking)
        if: steps.changes.outputs.run_tests == 'true'
        id: smoke_pass1
        continue-on-error: true
        run: uv run pytest tests/ -m smoke -q --junitxml=smoke-pass1.xml

      - name: Rerun smoke tests after failure (non-blocking)
        if: steps.changes.outputs.run_tests == 'true' && steps.smoke_pass1.outcome != 'success'
        id: smoke_pass2
        continue-on-error: true
        run: uv run pytest tests/ -m smoke -q --junitxml=smoke-pass2-rerun.xml

      - name: Upload smoke test diagnostics
        if: steps.changes.outputs.run_tests == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-diagnostics
          path: |
            smoke-pass1.xml
            smoke-pass2-rerun.xml

      - name: Generate coverage report (non-blocking)
        if: steps.changes.outputs.run_tests == 'true'
        id: coverage
        continue-on-error: true
        run: |
          uv run coverage erase
          uv run coverage run -m pytest tests/ -m "unit or smoke"
          uv run coverage report -m
          uv run coverage json -o coverage.json

      - name: Upload PR coverage artifact
        if: steps.changes.outputs.run_tests == 'true' && steps.coverage.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: pr-unit-smoke-coverage
          path: coverage.json

      - name: Summarize soft-fail checks
        if: steps.changes.outputs.run_tests == 'true'
        run: |
          if [ "${{ steps.smoke_pass1.outcome }}" = "success" ]; then
            echo "✅ Smoke endpoint checks passed on first attempt." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.smoke_pass2.outcome }}" = "success" ]; then
            echo "⚠️ Smoke endpoint checks failed on first attempt but passed on rerun (likely transient upstream/network flake)." >> $GITHUB_STEP_SUMMARY
          else
            echo "🚨 Smoke endpoint checks failed on both attempts (strong signal of endpoint/schema change)." >> $GITHUB_STEP_SUMMARY

            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
            from pathlib import Path
            import xml.etree.ElementTree as ET

            paths = [Path("smoke-pass2-rerun.xml"), Path("smoke-pass1.xml")]
            chosen = None
            for path in paths:
              if path.exists():
                chosen = path
                break

            if chosen is None:
              print("- Could not locate smoke JUnit XML diagnostics.")
            else:
              print(f"- Failure source file: `{chosen}`")
              tree = ET.parse(chosen)
              root = tree.getroot()
              failed = []
              for testcase in root.iter("testcase"):
                has_failure = testcase.find("failure") is not None or testcase.find("error") is not None
                if has_failure:
                  classname = testcase.attrib.get("classname", "")
                  name = testcase.attrib.get("name", "")
                  failed.append(f"{classname}::{name}".strip(":"))

              if not failed:
                print("- No failing testcase names found in diagnostics XML.")
              else:
                print("- Failing smoke tests:")
                for test in failed:
                  print(f"  - `{test}`")
            PY
          fi

          if [ "${{ steps.coverage.outcome }}" != "success" ]; then
            echo "⚠️ Coverage generation failed (non-blocking in fast lane)." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Coverage artifact generated for unit+smoke tests." >> $GITHUB_STEP_SUMMARY
          fi
